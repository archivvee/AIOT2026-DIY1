<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUO, JIAN-TING | Personal Page</title>
    <meta name="description" content="Personal landing page for GUO, JIAN-TING featuring a modern dark theme and dynamic clock.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Outfit:wght@200;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-mesh"></div>
    <main class="content-container">
        <section class="profile-card">
            <div class="glass-effect"></div>
            <div class="card-content">
                <header>
                    <h1 id="user-name" class="fade-in">GUO, JIAN-TING</h1>
                    <p class="subtitle fade-in-delay">Personal Profile</p>
                </header>
                
                <div class="clock-section fade-in-long">
                    <div class="clock-container">
                        <span id="digital-clock">00:00:00</span>
                        <span id="date-display">Tuesday, March 3, 2026</span>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
